name: CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build chapter 20 ontology
        run: python ../ontology/scripts/build_chapter20_ontology.py

      - name: Validate ontology
        run: python ../ontology/scripts/validate_ontology.py

      - name: Django system check
        run: python manage.py check

      - name: Backend tests
        run: python manage.py test

  mobile-ci:
    name: Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install mobile dependencies
        run: flutter pub get

      - name: Analyze mobile app
        run: flutter analyze

      - name: Run mobile tests
        run: flutter test

  backend-deploy:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    needs: [backend-ci, mobile-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/OntoAlert-MobileApp
            git pull --rebase origin main
            docker compose up -d --build
