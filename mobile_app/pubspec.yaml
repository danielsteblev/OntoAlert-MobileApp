name: fast_learning_mobile
description: Android-first legal education app with semantic search over chapter 20 of the Russian Administrative Offenses Code.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/search_mascot.png
    - assets/images/auth_mascot.png
